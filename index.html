* { box-sizing:border-box; }
html, body { height:100%; }
body {

.app { height:100dvh; display:flex; flex-direction:column; }

}
.titleLine { display:flex; align-items:center; justify-content:space-between; gap:10px; }
h1 {
  margin:0;
  font-size:clamp(18px,5.2vw,27px);
  line-height:1.05;
  font-weight:950;

}
.sub {
  margin-top:4px;
  font-size:12px;
  line-height:1.25;
  color:#ddd6fe;
}
.favToggle {
  flex:0 0 auto;

  font-size:12px;
  font-weight:900;

}
.favToggle.active { background:#fff; color:#21114f; }
.days {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:6px;
  margin-top:9px;
}
.dayBtn {
  border:0;
  border-radius:999px;
  padding:9px 5px;
  font:inherit;
  font-size:clamp(11px,3.5vw,15px);
  line-height:1;
  font-weight:950;
  color:#24105a;
  background:#ede9fe;

.dayBtn.active { background:#fff; color:#1e104a; box-shadow:0 1px 0 rgba(255,255,255,.65) inset; }
.viewport {
  flex:1 1 auto;
  min-height:0;

  overflow-x:hidden;

}
.stageHeaders {
  position:sticky;
  top:0;
  z-index:10;
  display:grid;
  gap:5px;
  align-items:end;
  padding:8px 4px 0;
  background:linear-gradient(180deg,rgba(247,248,252,1) 0%,rgba(247,248,252,.93) 80%,rgba(247,248,252,0) 100%);
}
.timeHead { height:30px; }
.stageHead {
  height:30px;
  border-radius:10px 10px 0 0;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(9px,2.8vw,14px);
  line-height:1;
  font-weight:950;
  letter-spacing:.015em;
  box-shadow:0 1px 5px rgba(15,23,42,.16);
  overflow:hidden;
}
.timeline {
  position:relative;
  width:100%;
  margin:0;
  padding:0;
}
.stageBg {
  position:absolute;
  top:0;
  border:1px solid #cbd5e1;
  border-top:0;
  border-radius:0 0 8px 8px;
  background:rgba(255,255,255,.66);
}
.hourLine,.halfLine { position:absolute; height:1px; background:var(--grid); }
.hourLine { height:2px; background:#cbd5e1; }
.halfLine { background:var(--grid2); }
.timeLabel {
  position:absolute;
  text-align:right;
  transform:translateY(-10px);
  font-size:clamp(11px,3.2vw,15px);
  font-weight:900;
  color:#344054;
  letter-spacing:-.03em;
}
.event {
  position:absolute;
  border:1.7px solid;
  border-radius:8px;
  padding:4px 4px 3px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(15,23,42,.08);
}
.event .time {
  font-weight:950;
  line-height:1;
  color:#0f172a;
  white-space:nowrap;
  letter-spacing:-.04em;
}
.event .artist {
  margin-top:2px;

  line-height:.96;
  letter-spacing:-.055em;
  color:#0b1020;

.event .style {
  margin-top:3px;

  line-height:1.04;

}
.event.fav {

.event.fav::after {

  position:absolute;

  top:3px;

  color:#ca8a04;

.emptyMsg {
  position:absolute;

  border:1px solid #e4e7ec;

}
.footer {

  color:#667085;
  font-size:11px;
  line-height:1.25;
  border-top:1px solid #e4e7ec;
  background:#f8fafc;
}
</style>

if (!DATA[currentDay]) currentDay = Object.keys(DATA)[0];
let layout = null;

function safeJSON(s, fallback) { try { return JSON.parse(s || ''); } catch { return fallback; } }
function saveFavs() { localStorage.setItem(favKey, JSON.stringify(favs)); }
function eventKey(day, stage, ev) { return `${day}|${stage}|${ev.start}|${ev.artist}`; }
function fmt(m) { m = ((m % 1440)+1440)%1440; return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function clamp(n,a,b) { return Math.max(a, Math.min(b,n)); }
function calcLayout() {
  const vp = document.getElementById('viewport');
  const w = Math.max(300, vp.clientWidth || window.innerWidth);
  const pad = 4;
  const gap = w < 380 ? 4 : 5;
  const timeW = w < 380 ? 40 : 46;
  const stageW = Math.max(58, (w - timeW - pad*2 - gap*4) / 4);
  const pxMin = w < 380 ? 2.18 : 2.28;
  const height = (endMin-startMin)*pxMin + 14;
  return {w,pad,gap,timeW,stageW,pxMin,height};
}
function yFor(min) { return (min - startMin) * layout.pxMin; }
function initDays() {
  const days = document.getElementById('days');
  days.innerHTML = '';
  for (const d of Object.keys(DATA)) {
    const b = document.createElement('button');
    b.className = 'dayBtn';
    b.type = 'button';
    b.dataset.day = d;
    b.textContent = DATA[d].title.replace('JEUDI ', 'JEU ').replace('VENDREDI ', 'VEN ').replace('SAMEDI ', 'SAM ');
    b.onclick = () => { currentDay = d; localStorage.setItem(dayKey,d); render(false); };
    days.appendChild(b);
  }
}
function renderHeaders() {
  const head = document.getElementById('stageHeaders');
  head.style.gridTemplateColumns = `${layout.timeW}px repeat(4, minmax(0, 1fr))`;
  head.style.paddingLeft = `${layout.pad}px`;
  head.style.paddingRight = `${layout.pad}px`;
  head.innerHTML = '<div class="timeHead"></div>';
  for (const st of STAGES) {
    const div = document.createElement('div');
    div.className = 'stageHead';
    div.style.background = COLORS[st].header;
    div.textContent = st.toUpperCase();
    head.appendChild(div);
  }
}
function render(keepScroll=true) {
  const vp = document.getElementById('viewport');
  const oldTop = vp.scrollTop;
  layout = calcLayout();
  renderHeaders();
  document.querySelectorAll('.dayBtn').forEach(b => b.classList.toggle('active', b.dataset.day === currentDay));
  document.getElementById('favOnlyBtn').classList.toggle('active', favOnly);
  const tl = document.getElementById('timeline');
  tl.style.height = `${layout.height}px`;
  tl.innerHTML = '';
  const gridLeft = layout.pad + layout.timeW + layout.gap;
  const gridRight = layout.w - layout.pad;
  for (let h = startMin; h <= endMin; h += 60) {
    const y = yFor(h);
    const lab = document.createElement('div');
    lab.className = 'timeLabel';
    lab.style.left = `${layout.pad}px`;
    lab.style.width = `${layout.timeW - 4}px`;
    lab.style.top = `${y}px`;
    lab.textContent = fmt(h);
    tl.appendChild(lab);
    const line = document.createElement('div');
    line.className = 'hourLine';
    line.style.left = `${gridLeft}px`;
    line.style.top = `${y}px`;
    line.style.width = `${gridRight-gridLeft}px`;
    tl.appendChild(line);
    if (h < endMin) {
      const half = document.createElement('div');
      half.className = 'halfLine';
      half.style.left = `${gridLeft}px`;
      half.style.top = `${yFor(h+30)}px`;
      half.style.width = `${gridRight-gridLeft}px`;
      tl.appendChild(half);
    }
  }
  STAGES.forEach((st, idx) => {
    const left = layout.pad + layout.timeW + layout.gap + idx*(layout.stageW + layout.gap);
    const bg = document.createElement('div');
    bg.className = 'stageBg';
    bg.style.left = `${left}px`;
    bg.style.width = `${layout.stageW}px`;
    bg.style.height = `${(endMin-startMin)*layout.pxMin}px`;
    tl.appendChild(bg);
  });
  let shown = 0;
  STAGES.forEach((st, idx) => {
    const left = layout.pad + layout.timeW + layout.gap + idx*(layout.stageW + layout.gap);
    for (const ev of DATA[currentDay].stages[st]) {
      const k = eventKey(currentDay, st, ev);
      const isFav = favs.includes(k);
      if (favOnly && !isFav) continue;
      shown++;
      const duration = ev.emin - ev.smin;
      const top = yFor(ev.smin) + 3;
      const h = Math.max(32, duration*layout.pxMin - 6);
      const div = document.createElement('div');
      div.className = 'event' + (isFav ? ' fav' : '');
      div.style.left = `${left + 3}px`;
      div.style.top = `${top}px`;
      div.style.width = `${layout.stageW - 6}px`;
      div.style.height = `${h}px`;
      div.style.background = COLORS[st].fill;
      div.style.borderColor = COLORS[st].border;
      const artistSize = clamp(layout.stageW * 0.145, 10.2, 14.5);
      const timeSize = clamp(layout.stageW * 0.105, 8.5, 11.2);
      const styleSize = clamp(layout.stageW * 0.095, 8.3, 10.8);
      const hideStyle = h < 42 || layout.stageW < 63;
      div.innerHTML = `<div class="time" style="font-size:${timeSize}px">${ev.start}–${ev.end}</div><div class="artist" style="font-size:${artistSize}px">${ev.artist}</div>${hideStyle ? '' : `<div class="style" style="font-size:${styleSize}px">[${ev.style}]</div>`}`;
      div.onclick = () => {
        const i = favs.indexOf(k);
        if (i >= 0) { favs.splice(i,1); }
        else { favs.push(k); }
        saveFavs();
        render(true);
      };
      tl.appendChild(div);
    }
  });
  if (favOnly && shown === 0) {
    const msg = document.createElement('div');
    msg.className = 'emptyMsg';
    msg.style.top = `${yFor(16*60)}px`;
    msg.innerHTML = 'Aucun favori pour ce jour.<br>Désactive “Favoris only”, puis tape sur les sets à garder.';
    tl.appendChild(msg);
  }
  if (!keepScroll) { vp.scrollTop = Math.max(0, yFor(15*60 + 45) - 16); }
  else { vp.scrollTop = Math.min(oldTop, tl.offsetHeight); }
}

document.getElementById('favOnlyBtn').onclick = () => {
  favOnly = !favOnly;
  localStorage.setItem(favOnlyKey, favOnly ? '1' : '0');
  render(true);
};
window.addEventListener('resize', () => render(true));
window.addEventListener('orientationchange', () => setTimeout(() => render(true), 220));
initDays();
render(false);
</script>
</body>
</html>
